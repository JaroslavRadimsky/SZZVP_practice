services:
  postgres:
    image: postgres:16
    container_name: szzvp-db01-postgres
    environment:
      POSTGRES_DB: szzvp_db
      POSTGRES_USER: szzvp
      POSTGRES_PASSWORD: szzvp
    ports:
      - "15432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U szzvp -d szzvp_db"]
      interval: 5s
      timeout: 3s
      retries: 10

